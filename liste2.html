<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>:root { --arena-blue: #0088ff; --bg: #000000; --card: #111111; } body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; } .container { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; } .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; position: relative; overflow: hidden; } .card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--arena-blue); } .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; } .logo-box { width: 50px; height: 50px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; color: var(--arena-blue); font-size: 20px; } .site-name { font-size: 18px; font-weight: bold; color: #fff; } .rating { font-size: 11px; color: var(--arena-blue); margin-top: 2px; font-weight: bold; } .bonus-box { background: rgba(0, 136, 255, 0.05); border: 1px dashed rgba(0, 136, 255, 0.3); border-radius: 8px; padding: 14px; text-align: center; margin-bottom: 12px; } .bonus-value { font-size: 19px; font-weight: 900; color: #fff; } .btn-arena { background: linear-gradient(135deg, #004488 0%, #0088ff 100%); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }</style></head><body><div class="container">
    <div class="card">
        <div class="card-header">
            <div class="logo-box">TE</div>
            <div class="info-area">
                <div class="site-name">Test</div>
                <div class="rating">⭐⭐⭐⭐⭐ <span class="label">5/5</span></div>
            </div>
        </div>
        <div class="bonus-box"><div class="bonus-value">400</div></div>
        <button class="btn-arena" onclick="showPopup('https://test.com', 'test', 'test Sitesine Gidiyorsunuz Onaylıyor Musunuz ?')">test Giriş Yap</button>
    </div></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>const webapp = window.Telegram.WebApp; webapp.expand(); let currentData = [{"ad": "test", "aciklama": "400", "link": "https://test.com"}]; function showPopup(url, name, msg) { webapp.showConfirm(msg, (c) => { if(c) webapp.openLink(url); }); }</script></body></html>
