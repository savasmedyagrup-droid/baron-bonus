<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>:root { --turkuaz: #00f2ff; --bg: #000; --card: #111; } body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; -webkit-user-select: none; } .container { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; } .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; position: relative; overflow: hidden; } .card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--turkuaz); } .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; } .logo-box { width: 50px; height: 50px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; color: var(--turkuaz); font-size: 20px; } .site-name { font-size: 18px; font-weight: bold; color: #fff; } .rating { font-size: 11px; color: var(--turkuaz); margin-top: 2px; font-weight: bold; } .bonus-box { background: rgba(0, 242, 255, 0.05); border: 1px dashed rgba(0, 242, 255, 0.3); border-radius: 8px; padding: 14px; text-align: center; margin-bottom: 12px; } .bonus-value { font-size: 19px; font-weight: 900; color: #fff; } .btn-turkuaz { background: linear-gradient(135deg, #008c95 0%, #00f2ff 100%); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }</style></head><body><div class="container"></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>window.Telegram.WebApp.expand();</script></body></html>
