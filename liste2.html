<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
    body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 15px; }
    .container { display: flex; flex-direction: column; gap: 20px; }
    .card { background: linear-gradient(145deg, #1e1e1e, #121212); border-radius: 15px; padding: 18px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, #ff9800, #f44336); }
    .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .logo-box { width: 55px; height: 55px; background: linear-gradient(45deg, #ff9800, #f44336); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3); }
    .site-name { font-size: 20px; font-weight: 900; color: #fff; }
    .rating { color: #ff9800; font-size: 11px; margin-top: 2px; font-weight: bold; }
    .bonus-container { background: rgba(255, 152, 0, 0.1); border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px dashed #ff9800; }
    .bonus-label { font-size: 10px; color: #ff9800; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .bonus-value { color: #ffffff; font-size: 18px; font-weight: 900; margin-top: 4px; }
    .footer-area { display: flex; align-items: center; gap: 10px; }
    .btn-kaydol { background: linear-gradient(45deg, #ff9800, #f44336); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 900; cursor: pointer; flex-grow: 1; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
    </style></head><body><div class="container"></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>
    const webapp = window.Telegram.WebApp; webapp.expand(); 
    function showPopup(url, name) { webapp.showConfirm(name.toUpperCase() + " Arenasına gidiyorsunuz?", (c) => { if(c) webapp.openLink(url); }); }
    </script></body></html>
