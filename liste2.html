<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 15px; }.container { display: flex; flex-direction: column; gap: 15px; }.card { background: #111; border: 1px solid #333; padding: 15px; border-top: 4px solid #fff; }.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }.logo-box { width: 45px; height: 45px; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; }.site-name { font-size: 17px; font-weight: 900; }.bonus-container { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-left: 2px solid #fff; }.bonus-label { font-size: 8px; color: #555; }.bonus-value { font-size: 15px; font-weight: 900; }.btn-kaydol { background: #fff; color: #000; border: none; padding: 12px; width: 100%; font-weight: 900; cursor: pointer; }</style></head><body><div class="container">
    <div class="card">
        <div class="card-header">
            <div class="logo-area"><div class="logo-box">DE</div></div>
            <div class="info-area">
                <div class="site-name">DENEME</div>
                <div class="rating">⚪⚫ BANKO ARENA ÖZEL</div>
            </div>
        </div>
        <div class="bonus-container">
            <div class="bonus-label">GÜNCEL BONUS</div>
            <div class="bonus-value">test</div>
        </div>
        <div class="footer-area">
            <button class="btn-kaydol" onclick="showPopup('ponro.com', 'deneme')">ARENAYA GİRİŞ</button>
        </div>
    </div></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>const webapp = window.Telegram.WebApp; webapp.expand(); function showPopup(url, name) { webapp.showConfirm(name.toUpperCase() + " Arenasına gidiyorsunuz?", (c) => { if(c) webapp.openLink(url); }); }</script></body></html>
