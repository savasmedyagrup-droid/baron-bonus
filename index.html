<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --gold: #ffea00; --bg: #000000; --card: #111111; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; -webkit-user-select: none; }
        .container { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .logo-box { width: 50px; height: 50px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; color: var(--gold); font-size: 20px; }
        .site-name { font-size: 18px; font-weight: bold; color: #fff; }
        .rating { font-size: 11px; color: var(--gold); margin-top: 2px; font-weight: bold; }
        .bonus-box { background: rgba(255, 234, 0, 0.05); border: 1px dashed rgba(255, 234, 0, 0.3); border-radius: 8px; padding: 14px; text-align: center; margin-bottom: 12px; }
        .bonus-value { font-size: 19px; font-weight: 900; color: #fff; }
        .btn-gold { background: linear-gradient(135deg, #fffb00 0%, #ffea00 100%); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }
    </style></head><body><div class="container"></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>
    const webapp = window.Telegram.WebApp; webapp.expand();
    function showPopup(url, name, msg) { webapp.showConfirm(msg, (c) => { if(c) webapp.openLink(url); }); }
    </script></body></html>
